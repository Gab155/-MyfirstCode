<!DOCTYPE html>
<html>
<head>
    <title>MYFIRSTCODE</title>
    <style>
        /* Created by Gabriel Olivares */
        body {
            background: url("http://ramflisa.url.ph/Bilder/binary.jpg");
            background-size: cover;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Courier New', monospace;
        }

        textarea {
            color: #00ff00;
            background-color: black;
            outline: none;
            margin-left: 25px;
            font-size: 15px;
            height: 300px;
            width: 250px;
            border: 1px solid #333;
            resize: none;
            padding: 10px;
            font-family: 'Courier New', monospace;
        }

        div {
            height: 200px;
            width: 250px;
        }

        #header {
            width: 255px;
            height: 25px;
            background-color: #2a2a2a;
            margin-left: 25px;
            margin-top: 30px;
            border: 1px solid #444;
            color: #00ff00;
            font-size: 16px;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            box-sizing: border-box;
            font-weight: bold;
        }

        #header .title {
            color: #00ff00;
            font-size: 14px;
            letter-spacing: 2px;
        }

        #header .close {
            color: #ff0000;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        #header .close:hover {
            background-color: #ff0000;
            color: white;
            padding: 0 8px;
            border-radius: 3px;
        }

        #mydiv {
            background-color: rgba(0, 0, 0, 0.85);
            padding: 10px 0 20px 0;
            border-radius: 8px;
            border: 1px solid #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>

<body>
    <div id="mydiv">
        <div id="header">
            <span class="title">⬢ MYFIRSTCODE</span>
            <span class="close">&times;</span>
        </div>
        <textarea id="myInput" autofocus readonly></textarea>
    </div>

    <script>
        // Created by Gabriel Olivares

        var count = 0;
        var str = "Hello Goodwall! 👋\n\nThis is my first code!\nI'm learning to code with GitHub Codespaces.\nThis is my journey to get my GitHub certificate!\n\n#MyFirstCode #GitHub #Goodwall #LearningToCode\n\nWatch me type this message like a pro hacker!\nJust kidding... I'm a beginner! 😄\n\nBut I'm excited to learn more!\n\nLet's go! 🚀";

        function myFunc() {
            document.getElementById("myInput").value += str[count];
            count++;

            // Fun celebration effect at the end
            if (count === str.length) {
                document.getElementById("header").style.borderColor = "#ff6b6b";
                document.getElementById("mydiv").style.borderColor = "#ff6b6b";
                document.getElementById("mydiv").style.boxShadow = "0 0 50px rgba(255, 107, 107, 0.3)";
            }

            // Dynamic typing speed for dramatic effect - MAS BILIS NA!
            clearInterval(x);

            // Random speed changes for fun hacker aesthetic
            if ([5, 24, 37, 66, 166].includes(count)) {
                x = setInterval(myFunc, 80);  // Mabilis
            } else if ([95, 121, 236, 295].includes(count)) {
                x = setInterval(myFunc, 150); // Medyo mabilis
            } else if (
                (count > 4 && count < 20) ||
                (count > 35 && count < 50) ||
                (count > 122 && count < 135) ||
                (count > 150 && count < 166) ||
                (count > 178 && count < 188) ||
                (count > 195 && count < 201) ||
                (count > 206 && count < 214) ||
                (count > 240 && count < 250) ||
                (count > 260 && count < 271) ||
                (count > 280 && count < 282) ||
                (count > 302 && count < 315)
            ) {
                x = setInterval(myFunc, 30); // Napakabilis!
            } else {
                x = setInterval(myFunc, 50); // Default mabilis
            }

            // Stop when complete
            if (count >= str.length) {
                clearInterval(x);
            }
        }

        var x = setInterval(myFunc, 50); // Simulan ng mabilis
    </script>
</body>
</html>
